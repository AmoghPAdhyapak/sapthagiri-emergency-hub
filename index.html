<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodBoard AI — Your Emotional Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1" id="orb1"></div>
    <div class="orb orb-2" id="orb2"></div>
    <div class="orb orb-3" id="orb3"></div>
  </div>

  <header class="header">
    <div class="logo">
      <span class="logo-icon">◎</span>
      <span class="logo-text">MoodBoard <em>AI</em></span>
    </div>
    <nav class="nav">
      <button class="nav-btn active" id="btn-journal" onclick="showView('journal')">Journal</button>
      <button class="nav-btn" id="btn-timeline" onclick="showView('timeline')">Timeline</button>
      <button class="nav-btn" id="btn-insights" onclick="showView('insights')">Insights</button>
    </nav>
  </header>

  <!-- ===== JOURNAL VIEW ===== -->
  <main class="view" id="view-journal">
    <div class="journal-container">
      <div class="mood-display" id="moodDisplay">
        <div class="mood-ring" id="moodRing">
          <div class="mood-emoji" id="moodEmoji">✦</div>
        </div>
        <div class="mood-label" id="moodLabel">How are you feeling today?</div>
        <div class="mood-score" id="moodScore"></div>
      </div>

      <div class="editor-card">
        <div class="editor-header">
          <span class="date-label" id="dateLabel"></span>
          <span class="char-count" id="charCount">0 / 500</span>
        </div>
        <textarea
          id="journalInput"
          class="journal-textarea"
          placeholder="Start writing… tell me about your day, your thoughts, your feelings. I'm listening."
          maxlength="500"
          oninput="handleInput(this)"
        ></textarea>
        <div class="editor-footer">
          <div class="tags-row" id="tagsRow"></div>
          <button class="save-btn" id="saveBtn" onclick="saveEntry()" disabled>
            Save Entry
          </button>
        </div>
      </div>

      <div class="ai-panel" id="aiPanel" style="display:none">
        <div class="ai-header">
          <span class="ai-dot"></span>
          <span>AI Reflection</span>
        </div>
        <div class="ai-text" id="aiText"></div>
      </div>
    </div>
  </main>

  <!-- ===== TIMELINE VIEW ===== -->
  <main class="view hidden" id="view-timeline">
    <div class="timeline-container">
      <h2 class="section-title">Your Mood Journey</h2>
      <div class="timeline-chart">
        <canvas id="timelineCanvas" width="700" height="200"></canvas>
      </div>
      <div class="entries-list" id="entriesList"></div>
    </div>
  </main>

  <!-- ===== INSIGHTS VIEW ===== -->
  <main class="view hidden" id="view-insights">
    <div class="insights-container">
      <h2 class="section-title">Your Emotional Patterns</h2>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="word-cloud-section">
        <h3 class="sub-title">Most Used Words</h3>
        <div class="word-cloud" id="wordCloud"></div>
      </div>
      <div class="streak-section">
        <h3 class="sub-title">Journaling Streak</h3>
        <div class="streak-display" id="streakDisplay"></div>
      </div>
    </div>
  </main>

  <script src="sentiment.js"></script>
  <script src="app.js"></script>
</body>
</html>
